<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="../images/PP_logo.jpeg">
<title>PlacePro Login</title>
<link rel="stylesheet" href="../css/login.css">
<!-- Google Script -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="../js/api.js"></script>
<script>
// Route each user type to its dashboard after login succeeds.
function redirectByRole(role) {
    const redirected = window.redirectToDashboardByRole
        ? window.redirectToDashboardByRole(role)
        : false;

    if (!redirected) {
        alert("Unable to identify your dashboard. Please log in again.");
        if (window.clearPlaceProSession) {
            window.clearPlaceProSession();
        }
    }
}
// Build one consistent session object for the whole frontend.
function buildSession(payload) {
    const normalizedRole = String(payload.role || "Student").toLowerCase();
    return {
        // Backend user id from the users table.
        id: payload.id || null,
        // Student id is used later to load /api/students/{id}.
        studentId: payload.studentId || null,
        // Use name from backend if available, otherwise fallback to email prefix.
        name: payload.name || (payload.email ? payload.email.split("@")[0] : "User"),
        email: payload.email || "",
        role: normalizedRole === "student" ? "Student" : normalizedRole === "admin" ? "Admin" : normalizedRole === "recruiter" ? "Recruiter" : "Student",
        photo: payload.photo || ""
    };
}
// ✅ GOOGLE LOGIN HANDLER
function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);
    const role = document.getElementById("selectedRole").value;
    // Google login still creates a frontend session directly.
    const session = buildSession({
        name: data.name,
        email: data.email,
        role: role,
        photo: data.picture || ""
    });
    if (window.setPlaceProSession) {
        window.setPlaceProSession(session);
    } else {
        localStorage.setItem("loggedInUser", session.name);
        localStorage.setItem("placeProSession", JSON.stringify(session));
    }
    redirectByRole(role);
}
// ✅ JWT PARSER
function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}
// ✅ ROLE SWITCH
function setRole(button, roleName) {
    document.querySelectorAll('.role').forEach(btn => {
        btn.classList.remove('active');
    });
    button.classList.add('active');
    document.getElementById("selectedRole").value = roleName;
}
// ✅ NORMAL LOGIN
async function normalLogin() {
    // Read values entered in the login form.
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("selectedRole").value;
    if (!email) {
        alert("Please enter email");
        return;
    }
    if (!password) {
        alert("Please enter password");
        return;
    }
    try {
        if (window.clearPlaceProSession) {
            window.clearPlaceProSession();
        }
        // Real login call to the backend instead of the previous local-only redirect.
        const payload = await placeProApi("/api/login", {
            method: "POST",
            // Send the same field names the Spring Boot LoginRequest expects.
            body: JSON.stringify({ email, password, role })
        });
        // Save backend response in localStorage so other pages know who is logged in.
        const session = buildSession(payload);
        if (window.setPlaceProSession) {
            window.setPlaceProSession(session);
        } else {
            localStorage.setItem("loggedInUser", session.name);
            localStorage.setItem("placeProSession", JSON.stringify(session));
        }
        redirectByRole(session.role);
    } catch (error) {
        alert(error.message || "Login failed");
    }
}
// ✅ SIGNUP REDIRECT
function goToSignup() {
    const role = document.getElementById("selectedRole").value;
    if (role === "Student") {
        window.location.href = "s_signup.html";
    } 
    else if (role === "Admin") {
        window.location.href = "a_signup.html";
    } 
    else if (role === "Recruiter") {
        window.location.href = "r_signup.html";
    }
}
    document.addEventListener("DOMContentLoaded", function () {
        const existingSession = window.getPlaceProSession ? window.getPlaceProSession() : null;
        if (existingSession && existingSession.role) {
            redirectByRole(existingSession.role);
            return;
        }

        const slides = document.querySelectorAll(".slide");
        let index = 0; 
        if (slides.length === 0) return; // safety check
        function showNextSlide() {
            slides[index].classList.remove("active");
            index = (index + 1) % slides.length;    
            slides[index].classList.add("active");
        }    
        // start auto sliding every 2 seconds
        setInterval(showNextSlide, 2000);

        const passwordInput = document.getElementById("password");
        if (passwordInput) {
            passwordInput.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    normalLogin();
                }
            });
        }
        });
</script>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <!-- LEFT SIDE -->
        <div class="left">
            <div class="logo-row">
                <img src="../images/PP_logo.jpeg">
                <span>PlacePro</span>
            </div>
            <h2>Welcome to PlacePro!</h2>
            <p class="sub">Login to your account</p>
            <!-- ROLES -->
            <div class="roles">
                <button class="role active" onclick="setRole(this,'Student')">Student</button>
                <button class="role" onclick="setRole(this,'Admin')">Admin</button>
                <button class="role" onclick="setRole(this,'Recruiter')">Recruiter</button>
            </div>
            <input type="hidden" id="selectedRole" value="Student">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
            <p class="forgot">Forgot password?</p>
            <button class="primary-btn" onclick="normalLogin()">Login</button>
            <!-- GOOGLE LOGIN -->
            <div class="divider">OR</div>
            <div class="google-wrapper">
                <div id="g_id_onload"
                    data-client_id="122497116018-oilku65h22hita86ed76kk4nqecddfg2.apps.googleusercontent.com"
                    data-context="signin"
                    data-ux_mode="popup"
                    data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                    data-type="standard"
                    data-shape="pill"
                    data-theme="outline"
                    data-text="continue_with"
                    data-size="large">
                </div>
            </div>
            <p class="bottom-text">
                Don’t have an account? <span onclick="goToSignup()">Sign up</span>
            </p>
        </div>
        <!-- RIGHT SIDE -->
        <div class="right">
            <div class="slider">
                <img src="../images/img_1.jpeg" class="slide active">
                <img src="../images/img_2.jpeg" class="slide">
                <img src="../images/img_3.jpeg" class="slide">
                <img src="../images/img_4.jpeg" class="slide">
                <img src="../images/img_5.jpeg" class="slide">
            </div>    
        </div>
        </div>
    </div>
</div>
</body>
</html>
