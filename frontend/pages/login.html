<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="pp.jpeg">
<title>PlacePro Login</title>
<link rel="stylesheet" href="../css/login.css">
<!-- Google Script -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ✅ GOOGLE LOGIN HANDLER
function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);
    localStorage.setItem("loggedInUser", data.name);
    const role = document.getElementById("selectedRole").value;
    if (role === "Student") {
        window.location.href = "student.html";
    } 
    else if (role === "Admin (TPO)") {
        window.location.href = "admin.html";
    } 
    else if (role === "Recruiter") {
        window.location.href = "recruiter.html";
    }
}
// ✅ JWT PARSER
function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}
// ✅ ROLE SWITCH
function setRole(button, roleName) {
    document.querySelectorAll('.role').forEach(btn => {
        btn.classList.remove('active');
    });
    button.classList.add('active');
    document.getElementById("selectedRole").value = roleName;
}
// ✅ NORMAL LOGIN
function normalLogin() {
    const email = document.getElementById("email").value;
    if (!email) {
        alert("Please enter email");
        return;
    }
    const name = email.split("@")[0];
    localStorage.setItem("loggedInUser", name);
    window.location.href = "student.html";
}
// ✅ SIGNUP REDIRECT
function goToSignup() {
    const role = document.getElementById("selectedRole").value;
    if (role === "Student") {
        window.location.href = "s_signup.html";
    } 
    else if (role === "Admin (TPO)") {
        window.location.href = "a_signup.html";
    } 
    else if (role === "Recruiter") {
        window.location.href = "r_signup.html";
    }
}
    document.addEventListener("DOMContentLoaded", function () {
        const slides = document.querySelectorAll(".slide");
        let index = 0; 
        if (slides.length === 0) return; // safety check
        function showNextSlide() {
            slides[index].classList.remove("active");
            index = (index + 1) % slides.length;    
            slides[index].classList.add("active");
        }    
        // start auto sliding every 2 seconds
        setInterval(showNextSlide, 2000);
        });
</script>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <!-- LEFT SIDE -->
        <div class="left">
            <div class="logo-row">
                <img src="../images/PP_logo.jpeg">
                <span>PlacePro</span>
            </div>
            <h2>Welcome to PlacePro!</h2>
            <p class="sub">Login to your account</p>
            <!-- ROLES -->
            <div class="roles">
                <button class="role active" onclick="setRole(this,'Student')">Student</button>
                <button class="role" onclick="setRole(this,'Admin (TPO)')">Admin</button>
                <button class="role" onclick="setRole(this,'Recruiter')">Recruiter</button>
            </div>
            <input type="hidden" id="selectedRole" value="Student">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <label>Password</label>
            <input type="password" placeholder="Enter password">
            <p class="forgot">Forgot password?</p>
            <button class="primary-btn" onclick="normalLogin()">Login</button>
            <!-- GOOGLE LOGIN -->
            <div class="divider">OR</div>
            <div class="google-wrapper">
                <div id="g_id_onload"
                    data-client_id="122497116018-oilku65h22hita86ed76kk4nqecddfg2.apps.googleusercontent.com"
                    data-context="signin"
                    data-ux_mode="popup"
                    data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                    data-type="standard"
                    data-shape="pill"
                    data-theme="outline"
                    data-text="continue_with"
                    data-size="large">
                </div>
            </div>
            <p class="bottom-text">
                Don’t have an account? <span onclick="goToSignup()">Sign up</span>
            </p>
        </div>
        <!-- RIGHT SIDE -->
        <div class="right">
            <div class="slider">
                <img src="../images/img_1.jpeg" class="slide active">
                <img src="../images/img_2.jpeg" class="slide">
                <img src="../images/img_3.jpeg" class="slide">
                <img src="../images/img_4.jpeg" class="slide">
                <img src="../images/img_5.jpeg" class="slide">
            </div>    
        </div>
        </div>
    </div>
</div>
</body>
</html>
