<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacePro | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/student.css">
</head>
<body class="bg-white text-black font-sans">
    <div class="app-shell flex min-h-screen">
        <nav class="sidebar w-60 bg-black text-white flex flex-col py-10 fixed h-full z-50">
            <div class="flex items-center gap-3 px-6 mb-12">
                <div class="w-8 h-8 bg-white flex items-center justify-center">
                    <div class="w-5 h-5 border-2 border-black"></div>
                </div>
                <span class="font-bold text-lg tracking-tighter uppercase">PlacePro</span>
            </div>
            <ul class="flex-grow" id="nav-list">
                <li class="mb-1"><button onclick="switchPage('home')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 active-nav" data-page="home"><i data-lucide="layout-dashboard" size="18"></i><span class="uppercase tracking-wider">Overview</span></button></li>
                <li class="mb-1"><button onclick="switchPage('notifications')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 border-transparent text-neutral-400 hover:text-white" data-page="notifications"><i data-lucide="bell" size="18"></i><span class="uppercase tracking-wider">Updates</span></button></li>
                <li class="mb-1"><button onclick="switchPage('jobs')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 border-transparent text-neutral-400 hover:text-white" data-page="jobs"><i data-lucide="briefcase" size="18"></i><span class="uppercase tracking-wider">Opportunities</span></button></li>
                <li class="mb-1"><button onclick="switchPage('applied')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 border-transparent text-neutral-400 hover:text-white" data-page="applied"><i data-lucide="clipboard-check" size="18"></i><span class="uppercase tracking-wider">Applied Records</span></button></li>
                <li class="mb-1"><button onclick="switchPage('certs')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 border-transparent text-neutral-400 hover:text-white" data-page="certs"><i data-lucide="award" size="18"></i><span class="uppercase tracking-wider">Education</span></button></li>
                <li class="mb-1"><button onclick="switchPage('resume')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 border-transparent text-neutral-400 hover:text-white" data-page="resume"><i data-lucide="file-text" size="18"></i><span class="uppercase tracking-wider">Documents</span></button></li>
                <li class="mb-1"><button onclick="switchPage('profile')" class="nav-btn w-full flex items-center gap-4 px-6 py-3 text-sm font-medium transition-all border-l-4 border-transparent text-neutral-400 hover:text-white" data-page="profile"><i data-lucide="user" size="18"></i><span class="uppercase tracking-wider">Profile</span></button></li>
            </ul>
            <div class="px-6 mt-auto">
              <button
                  id="logout-btn"
                  onclick="logoutUser()"
                  class="flex items-center gap-4 text-neutral-400 hover:text-white transition-colors text-sm font-medium uppercase tracking-widest">
                  <i data-lucide="log-out" size="18"></i>
                  Exit
              </button>
          </div>
          <script>
          function logoutUser() {
              localStorage.removeItem("placeProSession");
              localStorage.removeItem("loggedInUser");
              window.location.href = "login.html";
          }
          </script>
        </nav>
        <main class="main-content ml-60 flex-grow p-10 lg:p-14">
            <header class="flex justify-between items-end mb-16 pb-6 border-b border-neutral-200 gap-6">
                <div>
                    <p class="text-[10px] font-black tracking-[0.2em] text-neutral-400 uppercase mb-1">Student Portal</p>
                    <h1 id="page-title" class="text-3xl font-black uppercase tracking-tighter">Dashboard</h1>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-bold uppercase user-name-display">John Doe</p>
                        <p class="text-[10px] text-neutral-500 font-medium user-roll-display">0101CS211045</p>
                    </div>
                    <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=John%20Doe" class="w-10 h-10 rounded-full border border-black p-0.5" alt="Avatar">
                </div>
            </header>

            <div id="content-area"></div>
        </main>
    </div>
    <div id="modal-container" class="hidden"></div>
    <script src="../js/api.js"></script>
    <script src="../js/student.js"></script>
</body>
</html>
