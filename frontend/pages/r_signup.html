<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="place_pro_logo.jpeg">
<title>PlacePro Recruiter Sign Up</title>
<link rel="stylesheet" href="login.css">
<script>
function signupRecruiter(){
const recruiterid = document.getElementById("recruiterid").value;
const company = document.getElementById("company").value;
const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
if(recruiterid=="" || company=="" || name=="" || phone=="" || email=="" || password==""){
alert("Please fill all fields");
return;
}
alert("Recruiter Successfully Signed Up");
window.location.href="login.html";
}
</script>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <!-- LEFT PANEL (SLIDER) -->
        <div class="right">
            <div class="slider">
                <img src="img_1.jpeg" class="slide active">
                <img src="img_2.jpeg" class="slide">
                <img src="img_3.jpeg" class="slide">
                <img src="img_4.jpeg" class="slide">
                <img src="img_5.jpeg" class="slide">
            </div> 
        </div>
        <!-- RIGHT PANEL (FORM) -->
        <div class="left">
            <div class="logo-row">
                <img src="place_pro_logo.jpeg">
                <span>PlacePro</span>
            </div>
            <h2>Create Recruiter Account</h2>
            <p class="sub">Register your company with PlacePro</p>
            <form onsubmit="event.preventDefault(); signupRecruiter();">
                <label>Recruiter ID</label>
                <input type="text" id="recruiterid" placeholder="Enter recruiter ID">
                <label>Company Name</label>
                <input type="text" id="company" placeholder="Enter company name">
                <label>Recruiter Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <button class="primary-btn" type="submit">Sign Up</button>
                <p class="bottom-text">
                    Already have an account? 
                    <span onclick="window.location.href='login.html'">Login</span>
                </p>
            </form>
        </div>
    </div>
</div>
<!-- SLIDER SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const slides = document.querySelectorAll(".slide");
    let index = 0;
    function showNextSlide() {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }
    setInterval(showNextSlide, 3000);
});
</script>
</body>
</html>
