<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="place_pro_logo.jpeg">
<title>PlacePro Student Sign Up</title>
<link rel="stylesheet" href="login.css">
<script>
function signupStudent(){
const enroll = document.getElementById("enroll").value;
const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
if(enroll=="" || name=="" || phone=="" || email=="" || password==""){
alert("Please fill all fields");
return;
}
alert("Successfully Signed Up");
window.location.href="login.html";
}
</script>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <!-- LEFT PANEL (SLIDER - FROM LOGIN RIGHT) -->
        <div class="right">
            <div class="slider">
                <img src="img_1.jpeg" class="slide active">
                <img src="img_2.jpeg" class="slide">
                <img src="img_3.jpeg" class="slide">
                <img src="img_4.jpeg" class="slide">
                <img src="img_5.jpeg" class="slide">
            </div>  
        </div>
        <!-- RIGHT PANEL (FORM - FROM LOGIN LEFT) -->
        <div class="left">
            <div class="logo-row">
                <img src="place_pro_logo.jpeg">
                <span>PlacePro</span>
            </div>
            <h2>Create Your Account</h2>
            <p class="sub">Join PlacePr as a Student</p>
            <form onsubmit="event.preventDefault(); signupStudent();">
                <label>Enrollment Number</label>
                <input type="text" id="enroll" placeholder="Enter enrollment number">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter full name">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <button class="primary-btn" type="submit">Sign Up</button>
                <p class="bottom-text">
                    Already have an account? 
                    <span onclick="window.location.href='login.html'">Login</span>
                </p>
            </form>
        </div>
    </div>
</div>
<!-- SLIDER SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const slides = document.querySelectorAll(".slide");
    let index = 0;
    function showNextSlide() {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }
    setInterval(showNextSlide, 3000); // smoother timing
});
</script>
</body>
</html>
