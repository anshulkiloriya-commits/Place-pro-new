<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="../images/PP_logo.jpeg">
<title>PlacePro Admin Sign Up</title>
<link rel="stylesheet" href="../css/login.css">
<script src="../js/api.js"></script>
<script>
async function signupAdmin(){
const staffid = document.getElementById("staffid").value;
// These values come from the admin signup form.
const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
if(staffid=="" || name=="" || phone=="" || email=="" || password==""){
alert("Please fill all fields");
return;
}
try {
// Admin signup now uses the same backend registration API as login.
await placeProApi("/api/register", {
method: "POST",
body: JSON.stringify({
name: name,
email: email,
password: password,
// Role tells the backend which type of user is being created.
role: "ADMIN"
})
});
alert("Admin Successfully Signed Up");
window.location.href="login.html";
} catch (error) {
alert(error.message || "Signup failed");
}
}
</script>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <!-- LEFT PANEL (SLIDER) -->
        <div class="right">
            <div class="slider">
                <img src="../images/img_1.jpeg" class="slide active">
                <img src="../images/img_2.jpeg" class="slide">
                <img src="../images/img_3.jpeg" class="slide">
                <img src="../images/img_4.jpeg" class="slide">
                <img src="../images/img_5.jpeg" class="slide">
            </div> 
        </div>
        <!-- RIGHT PANEL (FORM) -->
        <div class="left">
            <div class="logo-row">
                <img src="../images/PP_logo.jpeg">
                <span>PlacePro</span>
            </div>
            <h2>Create Admin Account</h2>
            <p class="sub">Registering as Training & Placement Officer</p>
            <form onsubmit="event.preventDefault(); signupAdmin();">
                <label>Staff ID</label>
                <input type="text" id="staffid" placeholder="Enter staff ID">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter full name">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <button class="primary-btn" type="submit">Sign Up</button>
                <p class="bottom-text">
                    Already have an account? 
                    <span onclick="window.location.href='login.html'">Login</span>
                </p>
            </form>
        </div>
    </div>
</div>
<!-- SLIDER SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const slides = document.querySelectorAll(".slide");
    let index = 0;
    function showNextSlide() {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }
    setInterval(showNextSlide, 3000);
});
</script>
</body>
</html>
